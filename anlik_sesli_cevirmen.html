<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anlık Sesli Çevirmen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:
    radial-gradient(circle at top,#dff4ff 0%,#f5f8fb 42%,#dce8f2 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
  color:#253040;
}

.container{
  width:100%;
  max-width:560px;
  background:#ffffff;
  border-radius:24px;
  padding:28px;
  box-shadow:0 18px 60px rgba(30,55,90,.16);
  text-align:center;
  border:1px solid rgba(60,100,140,.12);
}

h1{
  font-size:1.55rem;
  color:#1f2d3d;
  margin-bottom:8px;
}

.subtitle{
  font-size:.9rem;
  color:#667085;
  line-height:1.45;
  margin-bottom:20px;
}

.lang-row{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  align-items:center;
  margin-bottom:20px;
}

select{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid #d6dee8;
  background:#f8fafc;
  color:#253040;
  font-weight:700;
  outline:none;
}

.swap-btn{
  border:none;
  width:44px;
  height:44px;
  border-radius:50%;
  background:#eef5ff;
  color:#1871d5;
  cursor:pointer;
  font-size:1.25rem;
  font-weight:900;
  transition:.15s;
}

.swap-btn:hover{background:#dcecff;transform:rotate(180deg)}

.mic-btn{
  width:92px;
  height:92px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#1677ff,#005bd3);
  color:white;
  font-size:2.4rem;
  cursor:pointer;
  transition:.2s;
  box-shadow:0 10px 26px rgba(22,119,255,.32);
  outline:none;
}

.mic-btn:hover{transform:scale(1.04)}
.mic-btn:active{transform:scale(.98)}

.mic-btn.listening{
  background:linear-gradient(135deg,#ff4d4f,#b42318);
  animation:pulse 1.3s infinite;
  box-shadow:0 10px 28px rgba(220,53,69,.32);
}

.mic-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,77,79,.45)}
  70%{box-shadow:0 0 0 18px rgba(255,77,79,0)}
  100%{box-shadow:0 0 0 0 rgba(255,77,79,0)}
}

.status{
  min-height:24px;
  margin:16px 0 18px;
  font-size:.9rem;
  color:#667085;
  font-weight:700;
}

.result-box{
  text-align:left;
  display:grid;
  gap:14px;
}

.box{
  background:#f8fafc;
  border:1px solid #e6edf5;
  border-radius:18px;
  padding:16px;
  min-height:92px;
}

.box-title{
  font-size:.78rem;
  color:#667085;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:8px;
}

.text{
  font-size:1.05rem;
  line-height:1.5;
  color:#1f2d3d;
  word-break:break-word;
}

.translated{
  color:#0f5fb8;
  font-weight:800;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:18px;
  flex-wrap:wrap;
}

.action-btn{
  flex:1;
  min-width:130px;
  border:none;
  border-radius:14px;
  padding:12px 14px;
  cursor:pointer;
  background:#eef5ff;
  color:#155db3;
  font-weight:900;
  transition:.15s;
}

.action-btn:hover{background:#dcecff}

.note{
  margin-top:16px;
  font-size:.78rem;
  color:#7a8493;
  line-height:1.45;
}

.error{
  color:#b42318 !important;
}

.success{
  color:#18753c !important;
}

@media(max-width:520px){
  .container{padding:22px}
  .lang-row{grid-template-columns:1fr}
  .swap-btn{margin:auto}
}
</style>
</head>
<body>

<div class="container">
  <h1>🎙️ Anlık Sesli Çevirmen</h1>
  <div class="subtitle">Mikrofona bas, konuş; metin otomatik yazıya çevrilip seçtiğin dile çevrilsin.</div>

  <div class="lang-row">
    <select id="sourceLang">
      <option value="tr-TR" data-api="tr">Türkçe</option>
      <option value="en-US" data-api="en">İngilizce</option>
    </select>

    <button class="swap-btn" id="swapBtn" title="Dilleri değiştir">⇄</button>

    <select id="targetLang">
      <option value="en">İngilizce</option>
      <option value="tr">Türkçe</option>
    </select>
  </div>

  <button id="micBtn" class="mic-btn" aria-label="Mikrofonu başlat">🎤</button>
  <div id="status" class="status">Konuşmak için mikrofona basın.</div>

  <div class="result-box">
    <div class="box">
      <div class="box-title">Algılanan Metin</div>
      <div id="originalText" class="text">...</div>
    </div>

    <div class="box">
      <div class="box-title">Çeviri</div>
      <div id="translatedText" class="text translated">...</div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn" id="copyOriginal">Algılananı Kopyala</button>
    <button class="action-btn" id="copyTranslated">Çeviriyi Kopyala</button>
    <button class="action-btn" id="clearBtn">Temizle</button>
  </div>

  <div class="note">
    Not: Mikrofon için sayfanın <b>HTTPS</b> üzerinden veya yerel dosya olarak açılması gerekir. En iyi sonuç için Chrome kullanın.
  </div>
</div>

<script>
const micBtn = document.getElementById('micBtn');
const statusText = document.getElementById('status');
const originalText = document.getElementById('originalText');
const translatedText = document.getElementById('translatedText');
const sourceLang = document.getElementById('sourceLang');
const targetLang = document.getElementById('targetLang');
const swapBtn = document.getElementById('swapBtn');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;
let isListening = false;

function getSourceApiLang(){
  return sourceLang.options[sourceLang.selectedIndex].dataset.api;
}

function setStatus(message, type=''){
  statusText.className = 'status ' + type;
  statusText.innerText = message;
}

function normalizeLangs(){
  const sourceApi = getSourceApiLang();
  if(sourceApi === targetLang.value){
    targetLang.value = sourceApi === 'tr' ? 'en' : 'tr';
  }
}

sourceLang.addEventListener('change', () => {
  normalizeLangs();
  if(recognition) recognition.lang = sourceLang.value;
});

targetLang.addEventListener('change', normalizeLangs);

swapBtn.addEventListener('click', () => {
  const sourceApi = getSourceApiLang();
  const target = targetLang.value;

  if(target === 'tr'){
    sourceLang.value = 'tr-TR';
    targetLang.value = 'en';
  }else{
    sourceLang.value = 'en-US';
    targetLang.value = 'tr';
  }

  if(sourceApi !== target){
    if(target === 'tr'){
      sourceLang.value = 'tr-TR';
      targetLang.value = 'en';
    }else{
      sourceLang.value = 'en-US';
      targetLang.value = 'tr';
    }
  }

  if(recognition) recognition.lang = sourceLang.value;
});

if(!SpeechRecognition){
  setStatus('Tarayıcınız ses tanımayı desteklemiyor. Lütfen Chrome deneyin.', 'error');
  micBtn.disabled = true;
}else{
  recognition = new SpeechRecognition();
  recognition.lang = sourceLang.value;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.continuous = false;

  micBtn.addEventListener('click', () => {
    if(!isListening){
      try{
        recognition.lang = sourceLang.value;
        recognition.start();
      }catch(e){
        setStatus('Mikrofon başlatılamadı. Birkaç saniye sonra tekrar deneyin.', 'error');
      }
    }else{
      recognition.stop();
    }
  });

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.innerText = '■';
    setStatus('Dinleniyor... Konuşmayı bitirince otomatik çevrilecek.');
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.innerText = '🎤';
    if(statusText.innerText === 'Dinleniyor... Konuşmayı bitirince otomatik çevrilecek.'){
      setStatus('Konuşmak için mikrofona basın.');
    }
  };

  recognition.onerror = (event) => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.innerText = '🎤';

    const messages = {
      'not-allowed': 'Mikrofon izni verilmedi. Tarayıcı izinlerinden mikrofona izin verin.',
      'no-speech': 'Ses algılanmadı. Mikrofona biraz daha yakın konuşun.',
      'audio-capture': 'Mikrofon bulunamadı veya kullanılamıyor.',
      'network': 'Ses tanıma için ağ hatası oluştu.'
    };

    setStatus(messages[event.error] || 'Ses tanıma hatası oluştu: ' + event.error, 'error');
  };

  recognition.onresult = async (event) => {
    const speechToText = event.results[0][0].transcript.trim();

    if(!speechToText){
      setStatus('Metin algılanamadı. Tekrar deneyin.', 'error');
      return;
    }

    originalText.innerText = speechToText;
    translatedText.innerText = 'Çevriliyor...';
    setStatus('Çevriliyor...');

    const source = getSourceApiLang();
    const target = targetLang.value;

    try{
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(speechToText)}&langpair=${source}|${target}`;
      const response = await fetch(url);

      if(!response.ok){
        throw new Error('Çeviri servisi yanıt vermedi.');
      }

      const data = await response.json();
      const translation = data?.responseData?.translatedText;

      if(!translation){
        throw new Error('Çeviri sonucu alınamadı.');
      }

      translatedText.innerHTML = cleanText(translation);
      setStatus(`Tamamlandı: ${source.toUpperCase()} → ${target.toUpperCase()}`, 'success');
    }catch(error){
      translatedText.innerText = 'Çeviri yapılamadı. İnternet bağlantısını veya çeviri servisini kontrol edin.';
      setStatus('Çeviri hatası oluştu.', 'error');
    }
  };
}

function cleanText(text){
  const div = document.createElement('div');
  div.innerHTML = text;
  return div.textContent || div.innerText || '';
}

async function copyText(el){
  const text = el.innerText.trim();
  if(!text || text === '...'){
    setStatus('Kopyalanacak metin yok.', 'error');
    return;
  }

  try{
    await navigator.clipboard.writeText(text);
    setStatus('Kopyalandı.', 'success');
  }catch(e){
    setStatus('Kopyalama başarısız oldu.', 'error');
  }
}

document.getElementById('copyOriginal').addEventListener('click', () => copyText(originalText));
document.getElementById('copyTranslated').addEventListener('click', () => copyText(translatedText));

document.getElementById('clearBtn').addEventListener('click', () => {
  originalText.innerText = '...';
  translatedText.innerText = '...';
  setStatus('Temizlendi. Konuşmak için mikrofona basın.');
});

normalizeLangs();
</script>

</body>
</html>
